# ============================================================
# CircleCI Configuration – Selenium + Pytest Pipeline
# ============================================================
# This pipeline runs all UI tests for the RoadTrippers project on every push/PR.
#
# Features:
# - Splits tests into stateless (parallel) and authenticated (sequential)
# - 30-minute silence timeout to prevent early kills
# - Verbose output (-v) to see every test step
# - Coverage reporting with pytest-cov (HTML output in artifacts)
# - Decodes COOKIES_BASE64 secret for auth tests
# - Stores JUnit XML, HTML reports, coverage HTML, and failure screenshots
#
# Author: Magdalena Takeva – interview project (March 2026)

version: 2.1

jobs:
  test:
    docker:
      # Official image with Python 3.11 + browsers (Chrome/Firefox)
      - image: cimg/python:3.11-browsers

    working_directory: ~/repo

    steps:
      # Checkout the repository code from GitHub
      - checkout

      # Restore cached dependencies (speeds up repeated builds)
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "requirements.txt" }}
            - v1-deps-

      # Create virtualenv and install all dependencies
      - run:
          name: Install Dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            # Make sure coverage tool is available
            pip install pytest-cov

      # Cache the virtualenv for next builds
      - save_cache:
          paths:
            - venv
          key: v1-deps-{{ checksum "requirements.txt" }}

      # Decode session cookies from secure secret (only needed for auth tests)
      - run:
          name: Decode Session Cookies from Secret
          command: |
            if [ -n "$COOKIES_BASE64" ]; then
              echo "$COOKIES_BASE64" | base64 -d > roadtrippers_cookies.pkl
              echo "Cookies successfully decoded from CircleCI secret"
              ls -l roadtrippers_cookies.pkl   # debug: confirm file size
            else
              echo "Warning: COOKIES_BASE64 not set – auth tests will fail or skip"
            fi

      # Create directories for output files
      - run:
          name: Prepare Output Directories
          command: |
            mkdir -p reports screenshots coverage_html

      # ------------------------------------------------------
      # Run stateless tests (no login) – parallel + coverage
      # ------------------------------------------------------
      - run:
          name: Run Stateless Tests (Parallel + Coverage)
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest \
              -m "not auth" \
              -n 2 \                          # 2 workers – balanced speed/stability
              -v \                            # verbose: show every test name
              --reruns 1 \
              --cov=pages --cov=tests \
              --cov-report=html:coverage_html/stateless \
              --junitxml=reports/junit-stateless.xml \
              --html=reports/stateless-report.html \
              --self-contained-html

      # ------------------------------------------------------
      # Run authenticated tests (needs cookies) – sequential
      # ------------------------------------------------------
      - run:
          name: Run Authenticated Tests (Sequential + Coverage)
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest \
              -m "auth" \
              -n 1 \                          # single worker – safe for session state
              -v \
              --reruns 1 \
              --cov=pages --cov=tests \
              --cov-report=html:coverage_html/auth \
              --junitxml=reports/junit-auth.xml \
              --html=reports/auth-report.html \
              --self-contained-html

      # Store test results (for CircleCI test insights)
      - store_test_results:
          path: reports

      # Store HTML test reports + coverage HTML
      - store_artifacts:
          path: reports
          destination: test-reports

      - store_artifacts:
          path: coverage_html
          destination: coverage-reports

      # Store failure screenshots
      - store_artifacts:
          path: screenshots
          destination: failure-screenshots

# ============================================================
# WORKFLOWS – Trigger on push/PR
# ============================================================

workflows:
  version: 2
  # Runs on every push to any branch and every pull request
  build_and_test:
    jobs:
      - test