# ============================================================
# CircleCI Configuration – Selenium + Pytest Pipeline
# ============================================================
# This pipeline runs all UI tests for the RoadTrippers project on every push/PR.
#
# Current Goal:
#   - Fix 0 tests collected issue (likely discovery or file path problem)
#   - Run all tests (stateless + auth) with verbose output
#   - Generate coverage report (HTML) for quality proof
#   - Store reports, coverage, and screenshots as downloadable artifacts
#
# Key Changes in this version:
#   - Removed -n (parallelism) temporarily → ensures stable discovery
#   - Added debug steps: list files, run --collect-only
#   - Kept cookie decode from COOKIES_BASE64 secret
#   - 30m no_output_timeout → prevents silent kills
#   - Coverage via pytest-cov → HTML report in artifacts
#
# Author: Magdalena Takeva – interview project (March 2026)
# ============================================================

version: 2.1

jobs:
  test:
    docker:
      # Official CircleCI image with Python 3.11 + Chrome + Firefox pre-installed
      - image: cimg/python:3.11-browsers

    working_directory: ~/repo

    steps:
      # Step 1: Checkout your code from GitHub
      - checkout

      # Step 2: Restore cached dependencies (speeds up repeated builds)
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "requirements.txt" }}
            - v1-deps-

      # Step 3: Create venv + install dependencies (including pytest-cov)
      - run:
          name: Install Python Dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest-cov   # for coverage reporting

      # Step 4: Cache the venv for next builds
      - save_cache:
          paths:
            - venv
          key: v1-deps-{{ checksum "requirements.txt" }}

      # Step 5: Decode session cookies from CircleCI secret (for auth tests)
      - run:
          name: Decode Session Cookies from Secret (if present)
          command: |
            if [ -n "$COOKIES_BASE64" ]; then
              echo "$COOKIES_BASE64" | base64 -d > roadtrippers_cookies.pkl
              echo "Cookies successfully decoded from CircleCI secret"
              ls -l roadtrippers_cookies.pkl   # debug: confirm file size
            else
              echo "Warning: COOKIES_BASE64 env var not set – auth tests will fail"
            fi

      # Step 6: Create output directories
      - run:
          name: Prepare Output Directories
          command: |
            mkdir -p reports screenshots coverage_html

      # Step 7: Debug – list all files in tests/ to confirm presence in CI
      - run:
          name: Debug – List Test Files in CI
          command: |
            echo "Listing contents of tests/ folder:"
            ls -la tests/ || echo "tests/ folder not found!"
            echo ""
            echo "Files matching *_tests.py:"
            find tests/ -name "*_tests.py" || echo "No matching files found"

      # Step 8: Debug – Show what pytest would collect (no execution)
      - run:
          name: Debug – Test Collection Only
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest --collect-only -v

      # Step 9: Run ALL tests (no markers, no parallelism) – with coverage
      - run:
          name: Run All Tests (Full Suite + Coverage)
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest \
              -v \                            # show every test name & status
              --reruns 1 \
              --cov=pages --cov=tests \
              --cov-report=html:coverage_html/full \
              --junitxml=reports/junit-full.xml \
              --html=reports/full-report.html \
              --self-contained-html

      # Step 10: Store test results (for CircleCI test insights)
      - store_test_results:
          path: reports

      # Step 11: Store HTML reports + coverage HTML
      - store_artifacts:
          path: reports
          destination: test-reports

      - store_artifacts:
          path: coverage_html
          destination: coverage-reports

      # Step 12: Store failure screenshots
      - store_artifacts:
          path: screenshots
          destination: failure-screenshots

# ============================================================
# WORKFLOWS – Trigger on every push/PR
# ============================================================

workflows:
  version: 2
  build_and_test:
    jobs:
      - test