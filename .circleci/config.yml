version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11-browsers

    working_directory: ~/repo

    steps:
      # 1. Force full checkout (no shallow clone)
      - checkout:
          fetch_depth: 0

      # 2. DEBUG: Prove files arrived in CI workspace
      - run:
          name: DEBUG – Confirm tests folder arrived
          command: |
            echo "=== Current working directory ==="
            pwd
            echo ""
            echo "=== Git tracked files with tests ==="
            git ls-files | grep tests || echo "No tests files tracked!"
            echo ""
            echo "=== Full recursive file list with tests ==="
            find . -type f | grep tests || echo "No tests files found"
            echo ""
            echo "=== tests/ folder exists? ==="
            if [ -d "tests" ]; then
              echo "YES - tests/ exists"
              ls -la tests/
            else
              echo "NO - tests/ MISSING after checkout!"
            fi
            echo ""
            echo "=== Matching *_tests.py files ==="
            find . -name "*_tests.py" 2>/dev/null || echo "No *_tests.py found"

      # 3. Install dependencies
      - run:
          name: Install Dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

      # 4. DEBUG: Collect from root
      - run:
          name: DEBUG – Pytest Collect from Root
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest --collect-only -v || echo "Collection from root failed"

      # 5. DEBUG: Force collect from tests/
      - run:
          name: DEBUG – Pytest Collect from tests/ folder
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest tests/ --collect-only -v || echo "Collection from tests/ failed"

      # 6. Run full test suite (uncomment when debug succeeds)
      - run:
          name: Run All Tests (Full Suite + Coverage)
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest \
              -v \
              --reruns 1 \
              --cov=pages --cov=tests \
              --cov-report=html:coverage_html/full \
              --junitxml=reports/junit.xml \
              --html=reports/report.html \
              --self-contained-html

      # Store artifacts
      - store_artifacts:
          path: coverage_html
          destination: coverage

      - store_artifacts:
          path: screenshots
          destination: screenshots

      - store_artifacts:
          path: reports
          destination: reports

workflows:
  version: 2
  build_and_test:
    jobs:
      - test