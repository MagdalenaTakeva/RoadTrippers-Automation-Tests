# ============================================================
# CircleCI Configuration – Selenium + Pytest Pipeline
# ============================================================
# Debug-focused version to fix "collected 0 items" issue
# Goal: Prove if tests/ folder and *_tests.py files arrive in CI workspace
# If files are missing → checkout problem
# If files present but 0 collected → pytest discovery issue
#
# Steps:
# 1. Force full checkout (no shallow clone)
# 2. Debug workspace: list all files, check tests/ existence
# 3. Debug collection: run --collect-only from root
# 4. Debug forced collection: run --collect-only from tests/
#
# Author: Magdalena Takeva – interview project (March 2026)
# ============================================================

version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11-browsers

    working_directory: ~/repo

    steps:
      # Step 1: Force full checkout (fetch all history, no shallow)
      - checkout:
          fetch_depth: 0

      # Step 2: DEBUG – Prove files arrived in CI workspace
      - run:
          name: DEBUG – Workspace & File Presence
          command: |
            echo "=== CURRENT WORKING DIRECTORY ==="
            pwd
            echo ""
            echo "=== GIT TRACKED FILES (git ls-files | grep tests) ==="
            git ls-files | grep tests || echo "No tests files tracked!"
            echo ""
            echo "=== FULL RECURSIVE FILE LIST (find . | grep tests) ==="
            find . -type f | grep tests || echo "No tests files found in workspace"
            echo ""
            echo "=== DOES tests/ FOLDER EXIST? ==="
            if [ -d "tests" ]; then
              echo "YES - tests/ exists"
              echo "Contents of tests/:"
              ls -la tests/
            else
              echo "NO - tests/ MISSING after checkout!"
            fi
            echo ""
            echo "=== FILES MATCHING *_tests.py ==="
            find . -name "*_tests.py" 2>/dev/null || echo "No *_tests.py files found"
            echo ""
            echo "=== DOES pytest.ini EXIST? ==="
            ls pytest.ini || echo "pytest.ini MISSING!"

      # Step 3: Install minimal deps for debug (only pytest)
      - run:
          name: Install Minimal Dependencies for Debug
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install pytest pytest-cov

      # Step 4: DEBUG – Try collection from root
      - run:
          name: DEBUG – Pytest Collect from Root
          no_output_timeout: 30m
          command: |
            . venv/bin/activate
            pytest --collect-only -v || echo "Collection from root failed"

      # Step 5: DEBUG – Force collection from tests/ folder
      - run:
          name: DEBUG