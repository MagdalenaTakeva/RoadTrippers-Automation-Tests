[pytest]

; Where to search for tests
testpaths =
    tests

; Patterns for test module files
python_files =
    *_tests.py

; Patterns for test function names
python_functions =
    test_*

; Folders to ignore during recursion
norecursedirs =
    .git
    .venv
    __pycache__
    htmlcov
    screenshots
    logs

; All custom markers used in the project
markers =
    auth: tests requiring authentication/cookies
    smoke: quick smoke tests
    regression: regression suite tests
    home_page: home page related tests
    add_stops: add stops screen tests
    trip_planner: trip planner screen tests
    negative: negative test cases
    flaky: known flaky tests (may need reruns)
    slow: intentionally slow tests
    xfail: expected to fail (for documentation)
    limit: tests that hit account/feature limits

; Default pytest command-line options
addopts =
    -ra
    --strict-markers
    --showlocals
    --tb=short
    -v

; Enable console logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)d)
log_cli_date_format = %Y-%m-%d %H:%M:%S

; Cache directory
cache_dir = .pytest_cache