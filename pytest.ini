[pytest]

; Where to search for tests (commented out – pytest defaults to looking in tests/)
; testpaths =
;     tests

python_files =
    *_tests.py

python_functions =
    test_*

norecursedirs =
    .git
    .venv
    __pycache__
    htmlcov
    screenshots
    logs

markers =
    auth
    smoke
    regression
    home_page
    add_stops
    trip_planner
    negative
    flaky
    slow
    xfail
    limit

addopts =
    -ra
    --strict-markers
    --showlocals
    --tb=short
    -v

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)d)
log_cli_date_format = %Y-%m-%d %H:%M:%S

cache_dir = .pytest_cache